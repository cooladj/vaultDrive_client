syntax = "proto3";

package vaultdrive;

// ============================================================================
// REQUEST MESSAGES
// ============================================================================

message unix_forward_req {
  oneof unix_forward_req_type {
    bool spindown = 2;
  }
}
message unix_forward_remove{
  uint64 connection_id =1;
  RemoveRequest remove = 2;

}



message unix_forward_res {
  oneof unix_forward_res_type {
    unix_forward_remove remove =1;
    bool spindown = 2;
  }
}



message Request {
  oneof request_type {
    AuthenticateRequest authenticate = 1;
    ReadFileRequest read_file = 2;
    WriteFileRequest write_file = 3;
    DeleteFileRequest delete_file = 4;
    RenameFileRequest rename_file = 5;
    ListDirectoryRequest list_directory = 6;
    CreateDirectoryRequest create_directory = 7;
    DeleteDirectoryRequest delete_directory = 8;
    GetFileInfoRequest get_file_info = 9;
    ListVolumesRequest list_volumes = 10;
    GetVolumeInfoRequest get_volume_info = 11;
    OpenFileRequest open_file = 13;
    LockRequest lock_file = 14;
    CreateFileRequest create_file = 15;
    CloseFileRequest close_file = 16;
    OverrideFileRequest override_file = 17;
    ReAuthenticateRequest reauthenticate = 18;
    RemoveRequest remove = 19;
    FlushFileRequest flush_file = 20;
    CanDelete can_delete=21;
  }
}

// ============================================================================
// RESPONSE MESSAGES
// ============================================================================

message Response {
  oneof response_type {
    AuthenticationSuccessOuterResponse authentication_success = 1;
    FileDataResponse file_data = 2;
    WriteSuccessResponse write_success = 3;
    OperationSuccessResponse operation_success = 4;
    DirectoryListingResponse directory_listing = 5;
    FileInfoResponse file_info = 6;
    VolumeListResponse volume_list = 7;
    VolumeInfoResponse volume_info = 8;
    ErrorResponse error = 9;

  }
}

// ============================================================================
// AUTHENTICATION
// ============================================================================

message AuthenticateRequest {
  string username = 1;
  string password = 2;
  string connection_id = 3;
}
message RemoveRequest{
  string connection_id = 1;
}

message ReAuthenticateRequest{
  string connection_id = 1;
  bytes key = 2;
}

message CloseFileRequest{
  uint64 file_handler = 1;
}

message AuthenticationSuccessOuterResponse{
  AuthenticationSuccessResponse authentication_success = 1;
  bytes key = 2;


}


message AuthenticationSuccessResponse {
  string host_name = 1;
  string user_id = 2;

}

message OverrideFileRequest{
  uint64 file_id =1;
  optional bool include_file_info =8;

}




// ============================================================================
// FILE OPERATIONS
// ============================================================================

message ReadFileRequest {
  string path = 1;
  uint64 offset = 2;
  uint32 length = 3;
  uint64 file_id =4;
  bool  compress = 5;
}
message CreateFileRequest{
  string path =1;
  uint64 file_id =4;
  uint32 flags = 5;

  optional bool include_file_info =8;

}

message FileDataResponse {
  bytes data = 1;
  uint64 offset = 2;
  bool compressed = 7;
}
message OpenFileRequest{
  string path =1;
  uint64 file_id =3;
  uint32 flags = 4;

}

message WriteFileRequest {
  string path = 1;
  uint64 offset = 2;
  bytes data = 3;
  uint64 file_id =5;
  uint32 flags =6;
  bool compressed = 7;

  optional bool include_file_info =8;
}

message FlushFileRequest{
  uint64 file_id =5;
  optional bool include_file_info =8;

}

message CanDelete{
  string path = 1;
}

message LockRequest{
  uint64 offset =1;
  uint64 length=2;
  uint64 file_id=3;
  bool wait=4;
  bool test=5;
  uint32 flags=6;

}

message WriteSuccessResponse {
  uint64 bytes_written = 1;
  optional FileInfoResponse file_info =2;

}

message DeleteFileRequest {
  string path = 1;
}


message RenameFileRequest {
  string old_path = 1;
  string new_path = 2;
}

message GetFileInfoRequest {
  string path = 1;
}

message FileInfoResponse {
  string name = 1;
  string path = 2;
  uint64 size = 3;
  bool is_directory = 4;
  int64 created_at = 5;
  int64 modified_at = 6;
  int64 accessed_at = 7;

  uint32 flags =8;
  bool is_compressed =9;
}

// ============================================================================
// DIRECTORY OPERATIONS
// ============================================================================

message ListDirectoryRequest {
  string path = 1;
}

message DirectoryListingResponse {
  repeated DirectoryEntry entries = 1;
}

message DirectoryEntry {
  string name = 1;
  bool is_directory = 2;
  uint64 size = 3;
  int64 modified = 4;
  int64 created =5;
  int64 accessed = 6;
}

message CreateDirectoryRequest {
  string path = 1;
  optional bool include_file_info =8;


}

message DeleteDirectoryRequest {
  string path = 1;
}

// ============================================================================
// VOLUME OPERATIONS
// ============================================================================

message ListVolumesRequest {
  // No fields needed
}

message VolumeListResponse {
  repeated VolumeInfo volumes = 1;
}

message GetVolumeInfoRequest {
  string volume_id = 1;
}

message VolumeInfoResponse {
  VolumeInfo volume = 1;
}

message VolumeInfo {
  string id = 1;
  string name = 2;
  string root_path = 3;
  uint64 total_size = 4;
  uint64 available_space = 5;
}



// ============================================================================
// COMMON TYPES
// ============================================================================

message OperationSuccessResponse {
  string message = 1;

  optional FileInfoResponse file_info =2;
}

message ErrorResponse {
  string message = 1;
  ErrorCode code = 2;
}

enum ErrorCode {
  INTERNAL_ERROR = 0;
  PERMISSION_DENIED = 1;
  NOT_FOUND = 2;
  ALREADY_EXISTS = 3;
  INVALID_REQUEST = 4;
  AUTHENTICATION_FAILED = 5;
  QUOTA_EXCEEDED = 6;
  IO_ERROR = 7;
  Invalid_Input = 8 ;
  Is_A_Directory =9;
  Not_A_Directory = 10;
  Invalid_Filename = 11;
}