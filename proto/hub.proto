syntax = "proto3";

package hub;


message HubRequest {
  oneof request_type {
    ServerHelloRequest server_hello_req = 1;
    ServerHelloResponse server_hello_res = 2;
    KeepAliveRequest keep_alive_req = 6;
    KeepAliveResponse keep_alive_res = 7;
    NatPokeRequest nat_poke_req = 8;
    NatPokeResponse nat_poke_res = 9;
    HealthCheckRequest health_req = 10;
    HealthCheckResponse health_res = 11;
    SubscriptionRequest subscription_req = 12;
    SubscriptionResponse subscription_res = 13;
    ClientHelloRequest client_hello_req = 14;
    ClientHelloResponse client_hello_res = 15;
    SetHostNameRequest set_hostname_req= 16;
    SetHostNameResponse set_hostname_res=17;
    NotifyRequest notify_req=18;
    DisconnectRequest disconnect_req=19;
    GetHostNameRequest get_hostname_req =20;
    GetHostNameResponse get_hostname_res =21;
    ClientRelayRequest client_relay_req= 22;
    ClientRelayResponse client_relay_res =23;
  }
}


message ServerHelloRequest {
  string device_id = 2;
}

message ServerHelloResponse {
  bool accepted = 1;
  optional string reason = 2;
  optional string hostname =3;
}

message SetHostNameRequest{
  string hostname = 1;
  string device_id = 2;


}
message SetHostNameResponse{
  bool success = 1;
  optional string error = 2;
}

message GetHostNameRequest{
  string device_id =1;
}
message GetHostNameResponse{
  optional string hostname = 1;
}

// Hub-initiated keep-alive (server only responds)
message KeepAliveRequest {
}

message KeepAliveResponse {
}

// Hub-initiated NAT traversal
message NatPokeRequest {
  string client_socket_addr=1;

}

message NatPokeResponse {
  bool reached = 1;
  optional string private_socket_addr=2;
}

message HealthCheckRequest {}

message HealthCheckResponse {
  string status = 1;
  int64 uptime_seconds = 2;
  int32 active_servers = 3;
}


message SubscriptionRequest {
  string id = 1;
}

message SubscriptionResponse {
  string device_id = 1;

  oneof response {
    PricingListResponse pricing_list = 2;
    CustomerPortalResponse customer_portal = 3;
  }
}

message PricingListResponse {
  repeated PriceListItem items = 1;

}
message CustomerPortalResponse{
  string url =1;
}




message ClientHelloRequest {
  string unique_id = 1;
  optional string private_socket_addr=2;
}

message ClientHelloResponse {
  bool found = 1;
  optional string socket_addr = 2;
  optional string secondary_socket_addr = 3;
}
message ClientRelayRequest {
  string Hostname =1;

}
message ClientRelayResponse{
  optional bytes token = 1;
}





message NotifyRequest {
  string id = 1;
  string event = 2;
}

message DisconnectRequest{
  uint64 time=1;
}

message PriceListItem {
  string name = 1;
  string description = 2;
  repeated PriceDetail prices = 3;
}

message PriceDetail {
  string url = 1;
  string amount = 2;
}